appId: com.whole-sale-erp
productName: Whole Sale ERP
directories:
  buildResources: build
  output: dist
afterPack: build/afterPack.js
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,requirements.txt}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!prisma/dev.db*'
  - '!prisma/migrations/*'
  - 'out/**/*'
  - '!out/renderer/**/*.map'
  - 'package.json'
  - 'node_modules/**/*'
  - 'prisma/schema.prisma'
asarUnpack:
  - resources/**
  - node_modules/@prisma/**
  - node_modules/.prisma/**
  - prisma/**
win:
  executableName: Whole-Sale-ERP
  target:
    - target: nsis
      arch:
        - x64
  verifyUpdateCodeSignature: false
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  hardenedRuntime: true
  gatekeeperAssess: false
  category: public.app-category.business
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Whole Sale ERP <support@wholesaleerp.com>
  category: Office
  packageCategory: Office
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Subhnegi
  repo: WholeSaleErp
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
